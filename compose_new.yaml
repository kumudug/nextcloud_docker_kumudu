services:
  # Note: MariaDB is an external service. You can find more information about the configuration here:
  # https://hub.docker.com/_/mariadb
  db:
    # Note: Check the recommend version here: https://docs.nextcloud.com/server/latest/admin_manual/installation/system_requirements.html#server
    image: mariadb:10.11
    command: --transaction-isolation=READ-COMMITTED
    restart: always
    volumes:
      - ./mariadb_volume:/var/lib/mysql:Z
    environment:
      - MARIADB_AUTO_UPGRADE=1
      - MARIADB_DISABLE_UPGRADE_BACKUP=1
    env_file:
      - db.env

  # Note: Redis is an external service. You can find more information about the configuration here:
  # https://hub.docker.com/_/redis
  redis:
    image: redis:alpine3.22
    restart: always

  app:
    image: nextcloud:31.0.8-apache
    restart: always
    expose:
      - 80
    volumes:
      # NOTE: The `volumes` config of the `cron` and `app` containers must match
      - ./nextcloud_data:/var/www/html/data:z
    environment:
      - MYSQL_HOST=db
      - REDIS_HOST=redis
      # Auto-install admin (one-time, first run)
      - NEXTCLOUD_ADMIN_USER=nextcloud-admin
      - NEXTCLOUD_ADMIN_PASSWORD=ChangeMeNow!
      # Behind reverse proxy / Traefik
      - NEXTCLOUD_TRUSTED_DOMAINS=nextcloud.kgune.com
      - TRUSTED_PROXIES=traefik
      - OVERWRITEPROTOCOL=https
      - OVERWRITEHOST=nextcloud.kgune.com
    env_file:
      - db.env
    depends_on:
      - db
      - redis
    networks:
      - proxy-tier
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextcloud.rule=Host(`nextcloud.kgune.com`)"
      - "traefik.http.routers.nextcloud.entrypoints=websecure"
      - "traefik.http.routers.nextcloud.tls.certresolver=letsencrypt"
      - "traefik.http.services.nextcloud.loadbalancer.server.port=80"
      # Middleware for Nextcloud headers (CalDAV/CardDAV redirects, HSTS)
      - "traefik.http.routers.nextcloud.middlewares=nextcloud-headers"
      - "traefik.http.middlewares.nextcloud-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.nextcloud-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.nextcloud-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.nextcloud-headers.headers.forceSTSHeader=true"

  cron:
    image: nextcloud:31.0.8-apache
    restart: always
    volumes:
      # NOTE: The `volumes` config of the `cron` and `app` containers must match
      - ./nextcloud_data:/var/www/html/data:z
    entrypoint: /cron.sh
    depends_on:
      - db
      - redis

  traefik:
    image: traefik:v3.4
    container_name: traefik
    restart: unless-stopped
    command:
      # API / Dashboard (local access at http://localhost:8080)
      - "--api.insecure=true"
      - "--api.dashboard=true"
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # HTTP -> HTTPS redirect
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Docker provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=proxy-tier"
      # Let's Encrypt ACME
      - "--certificatesresolvers.letsencrypt.acme.email=kum.kgune@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik_letsencrypt:/letsencrypt
    networks:
      - proxy-tier
    labels:
      # Dashboard accessible locally at http://localhost:8080
      - "traefik.enable=false"

  static-site:
    build: ./simple_static_webpage
    container_name: static-site
    restart: unless-stopped
    networks:
      - proxy-tier
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.static-site.rule=Host(`kgune.com`)"
      - "traefik.http.routers.static-site.entrypoints=websecure"
      - "traefik.http.routers.static-site.tls.certresolver=letsencrypt"
      - "traefik.http.services.static-site.loadbalancer.server.port=80"

networks:
  proxy-tier:
    external: false
